# Detect hardcoded secrets and API keys in source code.
# These are the highest-signal findings for indie hackers — leaked keys
# are the #1 cause of "I got hacked" incidents in small SaaS.
#
# Add new providers here as you encounter them in real scans.

rules:
  - id: hardcoded-anthropic-key
    pattern-either:
      - pattern: '"sk-ant-$X"'
      - pattern: "'sk-ant-$X'"
    message: Hardcoded Anthropic API key detected. Move to environment variable.
    languages: [generic]
    severity: ERROR
    metadata:
      category: secrets

  - id: hardcoded-openai-key
    pattern-either:
      - pattern: '"sk-$X"'
      - pattern: "'sk-$X'"
    paths:
      exclude:
        - "*.test.*"
        - "*.spec.*"
        - "*test*/**"
        - "*fixtures*/**"
    message: Possible hardcoded OpenAI API key. Move to environment variable.
    languages: [generic]
    severity: WARNING
    metadata:
      category: secrets

  - id: hardcoded-aws-key
    pattern-regex: 'AKIA[0-9A-Z]{16}'
    message: Hardcoded AWS access key detected. Rotate immediately and move to env var or IAM role.
    languages: [generic]
    severity: ERROR
    metadata:
      category: secrets

  - id: hardcoded-github-token
    pattern-regex: 'gh[pousr]_[A-Za-z0-9_]{36,}'
    message: Hardcoded GitHub token detected. Rotate immediately and move to env var.
    languages: [generic]
    severity: ERROR
    metadata:
      category: secrets

  - id: hardcoded-stripe-key
    pattern-regex: '(sk|rk)_live_[A-Za-z0-9]{24,}'
    message: Hardcoded Stripe live secret key. Rotate immediately.
    languages: [generic]
    severity: ERROR
    metadata:
      category: secrets

  - id: hardcoded-jwt-secret
    pattern-either:
      - pattern: jwt.sign($PAYLOAD, "$SECRET", ...)
      - pattern: jwt.sign($PAYLOAD, '$SECRET', ...)
    message: JWT signed with a hardcoded secret. Use process.env for the signing key.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      category: secrets

  - id: client-side-env-secret
    pattern-either:
      - pattern: process.env.NEXT_PUBLIC_$SECRET
    message: |
      Variables prefixed with NEXT_PUBLIC_ are exposed to the browser.
      Never put API keys, database URLs, or other secrets in NEXT_PUBLIC_*.
    paths:
      include:
        - "**/*.tsx"
        - "**/*.jsx"
        - "**/components/**"
        - "**/app/**"
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      category: secrets
